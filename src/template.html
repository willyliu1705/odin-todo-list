<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class="projects-container">
    <div class="create-project">
      <div id="create-project-button">
        <button>Create Project</button>
      </div>
      <div>
        <form>
          <label for="project-name">Name of Folder: </label>
          <input type="text" id="project-name" name="folder-name" placeholder="Chemistry">
        </form>
      </div>
    </div>

    <div class="projects"></div>
  </div>

  <div class="tasks-container">
    <div class="create-task">
      <div id="create-task-button">
        <button>Create Task</button>
      </div>
      <div>
        <form>
          <div>
            <label for="task-name">Name of Task: </label>
            <input type="text" id="task-name" placeholder="Chemistry">
          </div>

          <div>
            <label for="description">Description: </label>
            <input type="text" id="description" placeholder="Chemistry">
          </div>

          <div>
            <label for="due-date">Due Date: </label>
            <input type="text" id="due-date" placeholder="Chemistry">
          </div>

          <div>
            <label for="priority">Priority: </label>
            <input type="text" id="priority" placeholder="Chemistry">
          </div>
        </form>
      </div>
    </div>

    <div class="tasks"></div>
  <div>
</body>
</html>
